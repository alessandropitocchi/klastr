name: my-cluster
provider:
    type: kind
cluster:
    controlPlanes: 1
    workers: 1
    version: v1.31.0
plugins:
    argocd:
        enabled: true
        namespace: argocd
        version: stable
        repos:
            - name: app-repo
              url: git@git.elmec.com:PITOCCHI/test-argo.git
              type: git
              sshKeyFile: ~/.ssh/id_ed25519
        apps:
            - name: metallb
              namespace: demo-app
              repoURL: https://metallb.github.io/metallb
              chart: metallb
              targetRevision: 0.15.3
              values:
                replicaCount: 3
